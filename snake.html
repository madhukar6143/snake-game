<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #39ff14;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 14px;
    text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
    letter-spacing: 4px;
  }

  #hud {
    width: 400px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    margin-bottom: 6px;
    padding: 0 2px;
  }

  #hud span { text-shadow: 0 0 6px #39ff14; }

  #canvas-wrap {
    position: relative;
    line-height: 0;
  }

  canvas {
    display: block;
    border: 2px solid #39ff14;
    box-shadow: 0 0 12px #39ff14, 0 0 28px #39ff14, inset 0 0 8px rgba(57,255,20,0.08);
    image-rendering: pixelated;
  }

  /* scanline overlay */
  #canvas-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
  }

  #hint {
    margin-top: 10px;
    font-size: 8px;
    color: #1a7a0a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>🐍 SNAKE</h1>

<div id="hud">
  <span id="score-el">SCORE: 0</span>
  <span id="level-el">LVL: 1</span>
  <span id="hi-el">BEST: ...</span>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="400" height="400"></canvas>
</div>

<div id="hint">ARROWS move &bull; SPACE pause &bull; ENTER restart</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-el');
const levelEl = document.getElementById('level-el');
const hiEl    = document.getElementById('hi-el');

const COLS = 20, ROWS = 20, CELL = 20;
const SERVER = 'https://snake-game-iia4.onrender.com';

let snake, dir, nextDir, food, score, level, highScore, speed;
let paused = false, over = false, newRecord = false;
let lastTime = 0, elapsed = 0;
let foodPulse = 0;
let recordFlash = 0;

// ---------- high score (remote + localStorage fallback) ----------
async function loadHigh() {
  try {
    const res  = await fetch(SERVER + '/highscore');
    const data = await res.json();
    highScore  = data.highScore || 0;
    localStorage.setItem('snakeHighScore', highScore);
  } catch {
    highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  }
  hiEl.textContent = 'BEST: ' + highScore;
}

async function saveHigh(score) {
  localStorage.setItem('snakeHighScore', score);
  try {
    const res  = await fetch(SERVER + '/highscore', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ score })
    });
    const data = await res.json();
    highScore  = data.highScore ?? score;
  } catch {
    highScore = score;
  }
  hiEl.textContent = 'BEST: ' + highScore;
}

// ---------- init ----------
function startGame() {
  snake = [
    { x: 11, y: 10 },
    { x: 10, y: 10 },
    { x:  9, y: 10 }
  ];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score   = 0;
  level   = 1;
  speed   = 150;
  paused  = false;
  over    = false;
  newRecord = false;
  recordFlash = 0;
  elapsed = 0;
  spawnFood();
  updateHUD();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateHUD() {
  scoreEl.textContent = 'SCORE: ' + score;
  levelEl.textContent = 'LVL: '   + level;
  hiEl.textContent    = 'BEST: '  + highScore;
}

// ---------- input ----------
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; e.preventDefault(); break;
    case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y:  1 }; e.preventDefault(); break;
    case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; e.preventDefault(); break;
    case 'ArrowRight': if (dir.x !== -1) nextDir = { x:  1, y: 0 }; e.preventDefault(); break;
    case ' ':
      if (!over) { paused = !paused; elapsed = 0; }
      e.preventDefault();
      break;
    case 'Enter':
      if (over) { startGame(); }
      e.preventDefault();
      break;
  }
});

// ---------- game step ----------
function step() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel > level) {
      level = newLevel;
      speed = Math.max(60, 150 - (level - 1) * 12);
    }
    spawnFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

function endGame() {
  over = true;
  if (score > highScore) {
    newRecord = true;
    saveHigh(score);
  }
  updateHUD();
}

// ---------- draw ----------
function drawBackground() {
  ctx.fillStyle = '#050f05';
  ctx.fillRect(0, 0, 400, 400);
  ctx.fillStyle = '#0d1f0d';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillRect(c * CELL + CELL / 2 - 1, r * CELL + CELL / 2 - 1, 2, 2);
    }
  }
}

function drawFood() {
  const pulse = 0.5 + 0.5 * Math.sin(foodPulse);
  const glow  = 6 + 12 * pulse;
  const cx = food.x * CELL + CELL / 2;
  const cy = food.y * CELL + CELL / 2;
  ctx.save();
  ctx.shadowColor = '#ff0044';
  ctx.shadowBlur  = glow;
  ctx.fillStyle   = '#ff0044';
  const r = 5 + 2 * pulse;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function segColor(i, total) {
  const t = total <= 1 ? 0 : i / (total - 1);
  const r0 = 0x39, g0 = 0xff, b0 = 0x14;
  const r1 = 0x1a, g1 = 0x7a, b1 = 0x0a;
  const r = Math.round(r0 + (r1 - r0) * t);
  const g = Math.round(g0 + (g1 - g0) * t);
  const b = Math.round(b0 + (b1 - b0) * t);
  return `rgb(${r},${g},${b})`;
}

function drawSnake() {
  const total = snake.length;
  for (let i = total - 1; i >= 0; i--) {
    const seg    = snake[i];
    const isHead = i === 0;
    const color  = segColor(i, total);
    const size   = isHead ? CELL : CELL - 2;
    const offset = isHead ? 0 : 1;
    ctx.save();
    if (isHead) {
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur  = 15;
    }
    ctx.fillStyle = color;
    ctx.fillRect(seg.x * CELL + offset, seg.y * CELL + offset, size, size);
    ctx.restore();
  }
}

function drawPaused() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, 400, 400);
  ctx.save();
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur  = 12;
  ctx.fillStyle   = '#39ff14';
  ctx.font        = "16px 'Press Start 2P'";
  ctx.textAlign   = 'center';
  ctx.fillText('PAUSED', 200, 210);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, 400, 400);
  ctx.textAlign = 'center';

  ctx.save();
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur  = 16;
  ctx.fillStyle   = '#39ff14';
  ctx.font        = "20px 'Press Start 2P'";
  ctx.fillText('GAME OVER', 200, 145);
  ctx.restore();

  ctx.fillStyle = '#39ff14';
  ctx.font      = "10px 'Press Start 2P'";
  ctx.fillText('SCORE: ' + score, 200, 185);
  ctx.fillText('BEST: ' + highScore, 200, 210);

  if (newRecord) {
    const flash = 0.5 + 0.5 * Math.sin(recordFlash);
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.5 * flash;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur  = 20;
    ctx.fillStyle   = '#ffd700';
    ctx.font        = "12px 'Press Start 2P'";
    ctx.fillText('NEW RECORD!', 200, 240);
    ctx.restore();
  }

  ctx.fillStyle = '#1a7a0a';
  ctx.font      = "9px 'Press Start 2P'";
  ctx.fillText('PRESS ENTER TO RESTART', 200, 285);
}

// ---------- loop ----------
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - lastTime;
  lastTime = ts;
  foodPulse   += dt * 0.003;
  recordFlash += dt * 0.006;
  if (!over && !paused) {
    elapsed += dt;
    while (elapsed >= speed) {
      elapsed -= speed;
      step();
      if (over) break;
    }
  }
  drawBackground();
  drawFood();
  drawSnake();
  if (paused && !over) drawPaused();
  if (over)            drawGameOver();
}

// ---------- boot ----------
loadHigh().then(() => {
  startGame();
  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
});
</script>
</body>
</html>
